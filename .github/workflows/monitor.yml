name: Uptime Monitor

on:
  schedule:
    # Запуск каждый час ровно в 00 минут
    - cron: '0 * * * *'
      # Позволяет запустить workflow вручную из интерфейса GitHub
  workflow_dispatch:

jobs:
  ping_server:
    runs-on: ubuntu-latest
    permissions:
      issues: write # Разрешаем боту создавать Issue

    steps:
      - name: Check Health Endpoint
        run: |
          curl --fail https://gulinkonstantin-iris-api-gulin.hf.space/health

      - name: Create Issue on Failure
        # Этот шаг выполняется ТОЛЬКО если curl выдаст ошибку (сервер лежит)
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "🚨 Сбой в продакшене: Сервер недоступен!" \
            --body "Эндпоинт /health не ответил статусом 200. Проверьте логи сервера Hugging Face."